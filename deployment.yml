apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
      - name: product
        image: yekqpapp4q/mihras:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: product-config
